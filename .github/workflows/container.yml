name: Container / Headless Server

# Builds and publishes the headless server container image to GHCR.
# Runs independently of the desktop release workflow (build.yml).
#
# `:latest`   — updated on every push to main
# `:vX.Y.Z`  — published alongside desktop releases when a version tag is pushed

on:
  push:
    branches: [main, master]
    tags: ['v*']
  workflow_dispatch:

env:
  IMAGE_NAME: ${{ github.repository_owner }}/nexibot

jobs:
  container:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Stub nexibot-connect plugin
        run: |
          rm -f nexibot-connect
          mkdir -p nexibot-connect/src
          echo -e '[package]\nname = "nexibot-connect"\nversion = "0.1.0"\nedition = "2021"' > nexibot-connect/Cargo.toml
          echo '// stub' > nexibot-connect/src/lib.rs

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Containerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Appends the container pull command to the GitHub Release created by build.yml
  # when a version tag triggers both workflows simultaneously.
  release-note:
    needs: container
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - name: Append container note to release
        uses: softprops/action-gh-release@v2
        with:
          # append-body keeps any content already written by build.yml's release job
          append_body: true
          body: |

            ## Headless Server (Container)

            ```bash
            docker pull ghcr.io/${{ github.repository_owner }}/nexibot:${{ github.ref_name }}
            ```

            Deploy with compose:

            ```bash
            docker compose pull && docker compose up -d
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
