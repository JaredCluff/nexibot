name: Security Scan

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  schedule:
    # Run weekly on Monday at 06:00 UTC
    - cron: '0 6 * * 1'

permissions:
  contents: read

jobs:
  secret-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for scanning all commits

      - name: Run TruffleHog (secret detection)
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified

  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Stub nexibot-connect plugin
        run: |
          mkdir -p nexibot-connect/src
          echo -e '[package]\nname = "nexibot-connect"\nversion = "0.1.0"\nedition = "2021"' > nexibot-connect/Cargo.toml
          echo '// stub' > nexibot-connect/src/lib.rs

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Audit root workspace dependencies (nexibot-cli + nexibot-tauri + k2k-common)
        run: cargo audit
        # Audits the entire workspace from root (covers all members)

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Audit UI dependencies
        run: npm audit --audit-level=high || true
        working-directory: ui

      - name: Audit Bridge dependencies
        run: npm audit --audit-level=high || true
        working-directory: bridge

  cargo-clippy:
    name: Clippy Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Rust build cache
        uses: swatinem/rust-cache@v2

      - name: Stub nexibot-connect plugin
        run: |
          mkdir -p nexibot-connect/src
          echo -e '[package]\nname = "nexibot-connect"\nversion = "0.1.0"\nedition = "2021"' > nexibot-connect/Cargo.toml
          echo '// stub' > nexibot-connect/src/lib.rs

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            libglib2.0-dev \
            libopus-dev \
            libasound2-dev \
            protobuf-compiler

      - name: Run Clippy on full workspace
        run: cargo clippy --all-targets --all-features -- -D warnings
        env:
          CMAKE_POLICY_VERSION_MINIMUM: "3.5"

  cargo-test:
    name: Test Suite
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust build cache
        uses: swatinem/rust-cache@v2

      - name: Stub nexibot-connect plugin
        run: |
          mkdir -p nexibot-connect/src
          echo -e '[package]\nname = "nexibot-connect"\nversion = "0.1.0"\nedition = "2021"' > nexibot-connect/Cargo.toml
          echo '// stub' > nexibot-connect/src/lib.rs

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            libglib2.0-dev \
            libopus-dev \
            libasound2-dev \
            protobuf-compiler

      - name: Run workspace tests
        run: cargo test --workspace -- --test-threads=1
        env:
          CMAKE_POLICY_VERSION_MINIMUM: "3.5"
